<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#12141c">
    <title>Audiogravity - Offline</title>
    <style>
        :root {
            --bg-color: #12141c;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #00f2fe;
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 2rem;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin-bottom: 2rem;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.3));
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            letter-spacing: 0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin: 0 0 2rem 0;
        }

        .retry-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .retry-btn:hover, .retry-btn:active {
            background: rgba(0, 242, 254, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Minimalist Wi-Fi Off Icon SVG -->
        <svg class="icon pulse" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>

        <h1>Vous êtes hors ligne</h1>
        <p>L'application nécessite une connexion réseau pour contrôler Gravity.<br>Veuillez vérifier votre connexion.</p>
        
        <button class="retry-btn" onclick="window.location.reload()">Réessayer</button>
    </div>
</body>
</html>
