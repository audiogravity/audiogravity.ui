<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo/Header -->
            <div class="login-header">
                <img src="pics/audiogravity.svg" alt="Audiogravity" class="login-logo">
                <p class="login-subtitle" id="loginMeta"></p>
                <p class="auto-passkey-status" id="login-status"></p>
                <p class="login-license-status" id="loginLicense"></p>
            </div>

            <!-- Auto passkey panel -->
            <div id="autoPasskeyPanel" style="display:none" class="auto-passkey-panel">
                <img src="pics/audiogravity.svg" alt="Audiogravity" class="login-logo">
                <p class="auto-passkey-meta" id="autoPasskeyMeta"></p>

                <button type="button" id="autoPasskeyTrigger" class="auto-passkey-key-box" title="Tap to authenticate">
                    <div class="passkey"><svg viewBox="0 0 24 24">
                            <circle cx="9" cy="9" r="4"></circle>
                            <path d="M9 13 l0 8 l2 -2 l2 2 l0 -4"></path>
                            <path d="M14 10 l7 0"></path>
                            <path d="M18 10 l0 3"></path>
                        </svg></div>
                </button>

                <div class="auto-passkey-info">
                    <h2>Sign in with passkey</h2>
                    <p>Tap the key above. WebAuthn will use the<br>biometric enrolled on this device.</p>
                </div>

                <p id="autoPasskeyError" class="auto-passkey-error" style="display:none"></p>
                <p id="autoPasskeyStatus" class="auto-passkey-status"></p>
                <p class="login-license-status" id="autoPasskeyLicense"></p>
                <button type="button" id="autoPasskeyCancel" class="btn-link">Use password instead</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Username
                    </label>
                    <input type="text" id="username" name="username" required autocomplete="username"
                        placeholder="Enter your username" minlength="3">
                </div>

                <div class="form-group">
                    <label for="password">
                        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        placeholder="Enter your password" minlength="6">
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="error-message" style="display: none;">
                    <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                    <span id="errorText"></span>
                </div>

                <!-- Login Button -->
                <button type="submit" id="loginBtn" class="action-btn primary">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader">
                        <span class="spinner"></span>
                    </span>
                </button>

                <!-- Passkey Button (hidden until WebAuthn availability is confirmed) -->
                <div id="passkeyDivider" class="passkey-divider" style="display:none;">
                    <span>or</span>
                </div>
                <button type="button" id="passkeyBtn" class="action-btn secondary" style="display:none;">
                    <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>
                    <span class="btn-text">Sign in with Passkey</span>
                    <span class="btn-loader">
                        <span class="spinner"></span>
                    </span>
                </button>
            </form>

            <!-- Passkey setup offer (shown once after first password login) -->
            <div id="passkeyOffer" class="passkey-offer" style="display:none;">
                <p class="passkey-offer-text">
                    <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>
                    Enable Face ID / Touch ID for next time?
                </p>
                <div class="passkey-offer-actions">
                    <button type="button" id="passkeyOfferYes" class="action-btn primary">
                        <span class="btn-text">Enable</span>
                        <span class="btn-loader"><span class="spinner"></span></span>
                    </button>
                    <button type="button" id="passkeyOfferSkip" class="action-btn">Skip</button>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p class="version" id="versionInfo">Version ...</p>
            </div>
        </div>
    </div>
