         This meta tag covers the Vite dev server only. 'unsafe-eval' is needed for Vite HMR.
         In production, the Nginx CSP is applied instead (no unsafe-eval). -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-eval' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
        img-src 'self' data: blob: https://io.di-marco.net:65443;
        font-src 'self' data: https://fonts.gstatic.com;
        connect-src 'self' ws: wss: * http://*:* https://*:*;
        frame-src 'self' * http://*:* https://*:*;
        child-src 'self' * http://*:* https://*:*;
        worker-src 'self';
        base-uri 'self';
        form-action 'self';
    ">

    <!-- Critical Inline CSS to prevent white flash during initial load on PWA -->

        html, body {

<body>
    <!-- PWA SPLASH SCREEN (in-app overlay for Android/Chrome/Desktop PWA)
         The iOS native splash is handled by <link rel="apple-touch-startup-image"> in <head>.
         This overlay provides an equivalent experience on all other platforms. -->
    <div id="ag-splash-screen" role="status" aria-label="Loading Audiogravity" aria-live="polite">
        <div class="splash-logo-wrapper">
            <svg class="splash-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="9" cy="9" r="4"></circle>
                <path d="M9 13 l0 8 l2 -2 l2 2 l0 -4"></path>
                <path d="M14 10 l7 0"></path>
                <path d="M18 10 l0 3"></path>
            </svg>
            <span class="splash-wordmark">Audiogravi<sup>ty</sup></span>
        </div>
        <span class="splash-tagline">Audio Device Management</span>
    </div>

    <!-- Skip to main content link (for keyboard users) -->
    <a href="#main-content" class="skip-link">
        Skip to main content
    </a>

    <!-- TOPBAR -->
    <ag-top-bar></ag-top-bar>

    <!-- OFFLINE BANNER -->

        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        <span>OFFLINE MODE — VIEWING CACHED DATA</span>
        <button onclick="window.location.reload()" class="retry-link">RETRY</button>
    </div>

    <!-- CONFIG MODAL -->
    <ag-config-panel></ag-config-panel>

    <!-- NAVIGATION TABS -->

        <button class="tab-btn active" data-tab="profiles">Profiles</button>
        <button class="tab-btn" data-tab="services">Services</button>
        <button class="tab-btn" data-tab="audio-software">Audio Software</button>
        <button class="tab-btn" data-tab="systemd">Systemd</button>
        <button class="tab-btn" data-tab="performance">Performance</button>
        <button class="tab-btn" data-tab="config">Config</button>
        <button class="tab-btn" data-tab="system">System</button>
        <button class="tab-btn" data-tab="pipeline">Pipeline</button>
        <button class="tab-btn" data-tab="library">Library</button>
        <button class="tab-btn" data-tab="admin" style="display: none;">Admin</button>

    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content" role="main" tabindex="-1">

        <!-- PERFORMANCE OPTIMIZATION (Phase 0): Lazy-loaded page components -->
        <!-- Only Profiles tab is loaded initially, others created on-demand -->

        <!-- PROFILES TAB (always loaded) -->
        <section class="tab-content active" id="profiles">
            <div class="content-grid">
                <ag-profiles-page id="agProfilesPage"></ag-profiles-page>
                <ag-history-panel type="profile" title="HISTORY"></ag-history-panel>
            </div>
        </section>

        <!-- SERVICES TAB (lazy-loaded) -->
        <section class="tab-content" id="services">
            <div class="content-grid" data-lazy-container="services">
                <!-- Content will be injected on first visit -->
            </div>
        </section>

        <!-- AUDIO SOFTWARE TAB (lazy-loaded) -->
        <section class="tab-content" id="audio-software">
            <div class="content-grid" data-lazy-container="audio-software">
                <!-- Content will be injected on first visit -->
            </div>
        </section>

        <!-- SYSTEMD TAB (lazy-loaded) -->
        <section class="tab-content" id="systemd">
            <div class="content-grid" data-lazy-container="systemd">
                <!-- Content will be injected on first visit -->
            </div>
        </section>

        <!-- PERFORMANCE TAB (lazy-loaded) -->
        <section class="tab-content" id="performance">
            <div class="content-grid" data-lazy-container="performance">
                <!-- Content will be injected on first visit -->
            </div>
        </section>

        <!-- CONFIG TAB (lazy-loaded) -->
        <section class="tab-content" id="config">
            <div class="content-grid" data-lazy-container="config">
                <!-- Content will be injected on first visit -->
            </div>
        </section>

        <!-- SYSTEM TAB (lazy-loaded) -->
        <section class="tab-content" id="system" data-lazy-container="system">
            <!-- Content will be injected on first visit -->
        </section>

        <!-- PIPELINE TAB (lazy-loaded) -->
        <section class="tab-content" id="pipeline" data-lazy-container="pipeline">
            <!-- Content will be injected on first visit -->
        </section>

        <!-- ADMIN TAB (lazy-loaded) -->
        <section class="tab-content" id="admin">
            <div class="content-grid" data-lazy-container="admin">
                <!-- Content will be injected on first visit -->
            </div>
        </section>

        <!-- LIBRARY TAB -->
        <section class="tab-content" id="library">
            <ag-library-page></ag-library-page>
        </section>

    </main>

    <!-- CONFIRM MODAL -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 id="confirmTitle">Confirm Action</h3>
                <button class="modal-close" id="confirmClose" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">Are you sure?</p>
            </div>
            <div class="modal-footer">
                <button class="action-btn secondary" id="confirmCancel">Cancel</button>
                <button class="action-btn primary" id="confirmOk">Confirm</button>
            </div>
        </div>
    </div>
